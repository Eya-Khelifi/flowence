<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flowence - Sign Up</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="signup.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="auth-body">
    <nav class="auth-nav">
        <a href="index.html" class="logo"><img src="logo dark.png" alt="Flowence"></a>
    </nav>

    <div class="auth-container signup-container">
        <div class="signup-image-wrapper">
            <div class="signup-image-cropped"
                style="background-image: url('sign.jpg'); background-size: cover; background-position: center; width: 100%; height: 100%; min-height: 500px; border-radius: 20px; overflow: hidden;">
            </div>
        </div>
        <div class="auth-card signup-form-card">
            <div class="auth-header">
                <h2>Complete Your Profile</h2>
                <p>Help us personalize your experience with nutrition recommendations.</p>
            </div>

            <form id="signup-form" class="auth-form">
                <h3>Nutrition Calculator</h3>
                <p class="form-hint">We'll use this to personalize your dashboard.</p>

                <div class="form-row">
                    <div class="form-group">
                        <label>Age</label>
                        <input type="number" id="age" placeholder="25" min="1" max="120" required>
                        <small class="error-message" id="age-error"></small>
                    </div>
                    <div class="form-group">
                        <label>Gender</label>
                        <div class="radio-group">
                            <label class="radio-label">
                                <input type="radio" name="gender" value="male" required>
                                <span>Male</span>
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="gender" value="female" required>
                                <span>Female</span>
                            </label>
                        </div>
                        <small class="error-message" id="gender-error"></small>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Height (cm)</label>
                        <input type="number" id="height" placeholder="170" min="50" max="250" required>
                        <small class="error-message" id="height-error"></small>
                    </div>
                    <div class="form-group">
                        <label>Weight (kg)</label>
                        <input type="number" id="weight" placeholder="70" min="20" max="300" step="0.1" required>
                        <small class="error-message" id="weight-error"></small>
                    </div>
                </div>

                <div class="form-group">
                    <label>Activity Level</label>
                    <select id="activity-level" required>
                        <option value="sedentary">Sedentary (little or no exercise)</option>
                        <option value="lightly-active">Lightly Active (light exercise 1-3 days/week)</option>
                        <option value="moderately-active">Moderately Active (moderate exercise 3-5 days/week)</option>
                        <option value="very-active">Very Active (hard exercise 6-7 days/week)</option>
                    </select>
                    <small class="error-message" id="activity-level-error"></small>
                </div>

                <div class="form-group">
                    <label>Goal</label>
                    <select id="goal" required>
                        <option value="lose-weight">Lose Weight</option>
                        <option value="maintain-weight">Maintain Weight</option>
                        <option value="gain-muscle">Gain Muscle</option>
                    </select>
                    <small class="error-message" id="goal-error"></small>
                </div>

                <button type="submit" class="btn btn-primary btn-block">Calculate & Get Recommendations</button>
            </form>
        </div>
    </div>

    <script src="profile-setup.js"></script>
</body>

</html>
